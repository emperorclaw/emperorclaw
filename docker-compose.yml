services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: emperor
      POSTGRES_PASSWORD: emperor
      POSTGRES_DB: emperor
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emperor -d emperor"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  app:
    # Use the pre-built GHCR image for instant startup.
    # Switch to `build: .` if you want to build from source instead.
    image: ghcr.io/emperorclaw/emperorclaw:latest
    # build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - POSTGRES_CONNECTION_STRING=postgres://emperor:emperor@postgres:5432/emperor
      - APP_URL=http://localhost:3000
      - NEXTAUTH_URL=http://localhost:3000
      - STORAGE_BACKEND=local
      - STORAGE_LOCAL_DIR=./.data/storage
    volumes:
      - app-storage:/app/.data/storage
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy

  # ---- Auto-update via Watchtower (uncomment to enable) ----
  # Checks for new GHCR images every 5 min and updates automatically.
  # Without Watchtower, use the Update button in /ops to pull + restart manually.
  # watchtower:
  #   image: containrrr/watchtower
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #   command: --interval 300 --cleanup emperorclaw-app-1
  #   restart: unless-stopped

volumes:
  pgdata:
  app-storage:
