services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: emperor
      POSTGRES_PASSWORD: emperor
      POSTGRES_DB: emperor
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emperor -d emperor"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  app:
    # Use the pre-built GHCR image for instant startup.
    # Switch to `build: .` if you want to build from source instead.
    image: ghcr.io/emperorclaw/emperorclaw:latest
    # build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - POSTGRES_CONNECTION_STRING=postgres://emperor:emperor@postgres:5432/emperor
      - APP_URL=http://localhost:3000
      - NEXTAUTH_URL=http://localhost:3000
      - STORAGE_BACKEND=local
      - STORAGE_LOCAL_DIR=./.data/storage
    volumes:
      - app-storage:/app/.data/storage
    depends_on:
      postgres:
        condition: service_healthy

  # ---- Auto-update via Watchtower ----
  # Checks for new GHCR images every 5 min. The app can also trigger
  # an immediate update via POST http://watchtower:8080/v1/update
  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 --cleanup --http-api emperorclaw-app-1
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"

volumes:
  pgdata:
  app-storage:
