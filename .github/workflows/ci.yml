name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref when a new commit is pushed.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Advisory until the ~22 pre-existing lint errors are burned down; then
      # drop continue-on-error to make it a hard gate.
      - name: Lint (advisory)
        run: npm run lint
        continue-on-error: true

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test (unit + static)
        run: npm test

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: emperor
          POSTGRES_PASSWORD: emperor
          POSTGRES_DB: emperor_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U emperor -d emperor_test"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      POSTGRES_CONNECTION_STRING: postgres://emperor:emperor@localhost:5432/emperor_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Provision via the real migration chain — this also guards against
      # migration/schema drift (a missing migration makes the integration
      # tests' inserts fail). See TESTING.md.
      - name: Run migrations
        run: npm run db:migrate

      - name: Integration tests
        run: npm run test:integration
