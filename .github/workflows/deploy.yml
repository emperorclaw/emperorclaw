name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    environment: server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync source to VPS
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete --exclude='.env' --exclude='.git' --exclude='node_modules' --exclude='.next'
          path: .
          remote_path: /var/www/emperorclaw
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: root
          remote_key: ${{ secrets.VPS_SSH_KEY }}

      - name: Build and restart on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 10m
          script: |
            cd /var/www/emperorclaw
            npm install --production=false
            npm run build
            pm2 restart emperorclaw
            echo "✅ Deployed and restarted!"
