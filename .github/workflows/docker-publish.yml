name: Docker Publish

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Multi-arch so Apple Silicon (arm64) users can pull the image.
          # arm64 builds via QEMU emulation — slower, but cached across runs.
          platforms: linux/amd64,linux/arm64

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          # Publish the top-most "## [..]" section of CHANGELOG.md as the release
          # body. Falls back to empty (auto-generated notes still apply).
          if [ -f CHANGELOG.md ]; then
            awk '/^## \[/{c++} c==1{print} c==2{exit}' CHANGELOG.md | sed '1d' > RELEASE_BODY.md
          fi
          if [ ! -s RELEASE_BODY.md ]; then echo "_See commit history for changes._" > RELEASE_BODY.md; fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: RELEASE_BODY.md
          append_body: true
          generate_release_notes: true
